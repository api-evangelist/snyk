      path: /tenants/{tenant_id}/roles
      operations:
      - name: listtenantroles
        method: GET
        description: List all available roles for a given tenant (Early Access)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tenant_id
          in: path
          type: string
          description: Unique identifier of the tenant.
          required: true
        - name: name
          in: query
          type: string
          description: Role name filter.
      - name: createtenantrole
        method: POST
        description: Create a custom tenant role for a given tenant (Early Access)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tenant_id
          in: path
          type: string
          description: Unique identifier of the tenant.
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
