      path: /tenants/{tenant_id}/roles/{role_id}
      operations:
      - name: deletetenantrole
        method: DELETE
        description: Delete a specific tenant role by its id and its tenant id. (Early Access)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tenant_id
          in: path
          type: string
          description: Unique identifier of the tenant.
          required: true
      - name: gettenantrole
        method: GET
        description: Return a specific role by its id and its tenant id. (Early Access)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: tenant_id
