      operations:
      - method: GET
        name: listtenantroles
        description: List all available roles for a given tenant (Early Access)
        call: rest-tenantrole.listtenantroles
        with:
          tenant_id: rest.tenant_id
          name: rest.name
        outputParameters:
        - type: object
          mapping: $.
