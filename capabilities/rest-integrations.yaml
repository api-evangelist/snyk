naftiko: 1.0.0-alpha2
info:
  label: Snyk API — Integrations
  description: 'Snyk API — Integrations. 7 operations. Lead operation: List all integrations for an organization (Early Access).
    Self-contained Naftiko capability covering one Snyk business surface.'
  tags:
  - Snyk
  - Integrations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SNYK_API_KEY: SNYK_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-integrations
    baseUri: https://api.snyk.io/rest
    description: Snyk API — Integrations business capability. Self-contained, no shared references.
    resources:
    - name: orgs-org_id-integrations
      path: /orgs/{org_id}/integrations
      operations:
      - name: listintegrations
        method: GET
        description: List all integrations for an organization (Early Access)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: The organization public ID
          required: true
      - name: createintegration
        method: POST
        description: Create an integration for an organization (Early Access)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: The organization public ID
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: orgs-org_id-integrations-integration_id
      path: /orgs/{org_id}/integrations/{integration_id}
      operations:
      - name: deleteintegration
        method: DELETE
        description: Delete an integration (Early Access)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: The organization public ID
          required: true
        - name: integration_id
          in: path
          type: string
          description: The unique identifier for the integration
          required: true
      - name: getintegration
        method: GET
        description: Get a specific integration (Early Access)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: The organization public ID
          required: true
        - name: integration_id
          in: path
          type: string
          description: The unique identifier for the integration
          required: true
      - name: updateintegration
        method: PATCH
        description: Update an existing integration (Early Access)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: The organization public ID
          required: true
        - name: integration_id
          in: path
          type: string
          description: The unique identifier for the integration
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: orgs-org_id-integrations-integration_id-settings
      path: /orgs/{org_id}/integrations/{integration_id}/settings
      operations:
      - name: getintegrationsettings
        method: GET
        description: Get integration settings (Early Access)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: The organization public ID
          required: true
        - name: integration_id
          in: path
          type: string
          description: The unique identifier for the integration
          required: true
      - name: updateintegrationsettings
        method: PATCH
        description: Update integration settings (Early Access)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: The organization public ID
          required: true
        - name: integration_id
          in: path
          type: string
          description: The unique identifier for the integration
          required: true
