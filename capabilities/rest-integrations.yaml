      outputParameters:
      - type: object
        mapping: $.
    - name: get-integration-settings-early-access
      description: Get integration settings (Early Access)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-integrations.getintegrationsettings
      with:
        org_id: tools.org_id
        integration_id: tools.integration_id
      outputParameters:
