naftiko: 1.0.0-alpha2
info:
  label: Snyk API — Package Version
  description: 'Snyk API — Package Version. 1 operations. Lead operation: Get a package version (Early Access). Self-contained
    Naftiko capability covering one Snyk business surface.'
  tags:
  - Snyk
  - Package Version
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SNYK_API_KEY: SNYK_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-package-version
    baseUri: https://api.snyk.io/rest
    description: Snyk API — Package Version business capability. Self-contained, no shared references.
    resources:
    - name: orgs-org_id-ecosystems-ecosystem-packages-package_name-versions-package_version
      path: /orgs/{org_id}/ecosystems/{ecosystem}/packages/{package_name}/versions/{package_version}
      operations:
      - name: getpackageversion
        method: GET
        description: Get a package version (Early Access)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: Org ID
          required: true
    authentication:
      type: bearer
      token: '{{env.SNYK_API_KEY}}'
  exposes:
  - type: rest
    namespace: rest-package-version-rest
    port: 8080
    description: REST adapter for Snyk API — Package Version. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/orgs/{org-id}/ecosystems/{ecosystem}/packages/{package-name}/versions/{package-version}
      name: orgs-org-id-ecosystems-ecosystem-packages-package-name-versions-package-version
      description: REST surface for orgs-org_id-ecosystems-ecosystem-packages-package_name-versions-package_version.
      operations:
      - method: GET
        name: getpackageversion
        description: Get a package version (Early Access)
        call: rest-package-version.getpackageversion
        with:
          org_id: rest.org_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-package-version-mcp
    port: 9090
    transport: http
    description: MCP adapter for Snyk API — Package Version. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-package-version-early-access
      description: Get a package version (Early Access)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-package-version.getpackageversion
      with:
        org_id: tools.org_id
      outputParameters:
      - type: object
        mapping: $.
