        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-issues-mcp
    port: 9090
    transport: http
    description: MCP adapter for Snyk API — Issues. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
