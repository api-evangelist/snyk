    - name: get-list-org-memberships-group
      description: Get list of org memberships of a group user
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-groups.listgroupuserorgmemberships
      with:
        group_id: tools.group_id
        user_id: tools.user_id
      outputParameters:
      - type: object
