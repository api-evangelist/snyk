naftiko: 1.0.0-alpha2
info:
  label: Snyk API — LanguagesSettings
  description: 'Snyk API — LanguagesSettings. 2 operations. Lead operation: Get language settings for an organization (Early
    Access). Self-contained Naftiko capability covering one Snyk business surface.'
  tags:
  - Snyk
  - LanguagesSettings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SNYK_API_KEY: SNYK_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-languagessettings
    baseUri: https://api.snyk.io/rest
    description: Snyk API — LanguagesSettings business capability. Self-contained, no shared references.
    resources:
    - name: orgs-org_id-settings-open_source-languages
      path: /orgs/{org_id}/settings/open_source/languages
      operations:
      - name: getorglanguagessettings
        method: GET
        description: Get language settings for an organization (Early Access)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: The id of the org for which we want to update the Snyk Languages settings
          required: true
    - name: orgs-org_id-settings-open_source-languages-language
      path: /orgs/{org_id}/settings/open_source/languages/{language}
      operations:
      - name: updateorglanguagessettings
        method: PATCH
        description: Update language settings for an organization (Early Access)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          description: The id of the org for which we want to update the Snyk Languages settings
          required: true
        - name: language
          in: path
          type: string
          description: The language for which settings are being updated
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SNYK_API_KEY}}'
  exposes:
  - type: rest
    namespace: rest-languagessettings-rest
    port: 8080
    description: REST adapter for Snyk API — LanguagesSettings. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/orgs/{org-id}/settings/open-source/languages
      name: orgs-org-id-settings-open-source-languages
      description: REST surface for orgs-org_id-settings-open_source-languages.
      operations:
      - method: GET
        name: getorglanguagessettings
        description: Get language settings for an organization (Early Access)
        call: rest-languagessettings.getorglanguagessettings
        with:
          org_id: rest.org_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orgs/{org-id}/settings/open-source/languages/{language}
      name: orgs-org-id-settings-open-source-languages-language
      description: REST surface for orgs-org_id-settings-open_source-languages-language.
      operations:
      - method: PATCH
        name: updateorglanguagessettings
        description: Update language settings for an organization (Early Access)
        call: rest-languagessettings.updateorglanguagessettings
        with:
          org_id: rest.org_id
          language: rest.language
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-languagessettings-mcp
    port: 9090
    transport: http
    description: MCP adapter for Snyk API — LanguagesSettings. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-language-settings-organization-early
      description: Get language settings for an organization (Early Access)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-languagessettings.getorglanguagessettings
      with:
        org_id: tools.org_id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-language-settings-organization-early
      description: Update language settings for an organization (Early Access)
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: rest-languagessettings.updateorglanguagessettings
      with:
        org_id: tools.org_id
        language: tools.language
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
